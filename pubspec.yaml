name: hostelx
description: Pakistan's Student Hostel Finder Application
publish_to: 'none'
version: 1.0.2+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  url_launcher: ^6.3.1
  fl_chart: ^1.2.0
  intl: ^0.20.2
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.4
  firebase_storage: ^12.3.2
  image_picker: ^1.1.2
  http: ^1.6.0
  webview_flutter: ^4.13.1
  geocoding: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: "^0.14.4"
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/foreground_logo.png"
  adaptive_icon_background: "assets/images/foreground_logo.png"
  adaptive_icon_foreground: "assets/images/foreground_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
